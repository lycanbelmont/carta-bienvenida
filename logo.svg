<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 122">

  <!-- === BADGE CIRCLE === -->
  <circle cx="61" cy="61" r="56" fill="#0d1b2a"/>
  <circle cx="61" cy="61" r="56" fill="none" stroke="#4a8aaa" stroke-width="1.2"/>

  <!-- Crescent moon (top-right inside circle) -->
  <circle cx="86" cy="27" r="11" fill="#d8c878"/>
  <circle cx="89" cy="24" r="9"  fill="#0d1b2a"/>

  <!-- Stars -->
  <circle cx="22" cy="28" r="1"   fill="white" opacity="0.6"/>
  <circle cx="34" cy="16" r="0.7" fill="white" opacity="0.45"/>
  <circle cx="96" cy="44" r="0.7" fill="white" opacity="0.4"/>

  <!-- === WOLF HEAD === -->

  <!-- Left ear outer -->
  <polygon points="25,54 39,18 57,51" fill="#2e6585"/>
  <!-- Left ear inner (pink/warm) -->
  <polygon points="30,52 40,26 53,50" fill="#7ab0c8" opacity="0.55"/>

  <!-- Right ear outer -->
  <polygon points="65,51 83,18 97,54" fill="#2e6585"/>
  <!-- Right ear inner -->
  <polygon points="69,50 83,26 92,52" fill="#7ab0c8" opacity="0.55"/>

  <!-- Head main polygon (ears connect at base) -->
  <polygon points="25,54 57,51 65,51 97,54 104,79 89,105 61,113 33,105 18,79"
           fill="#2a5f80"/>

  <!-- Lighter cheek/face center overlay -->
  <ellipse cx="61" cy="86" rx="27" ry="21" fill="#4a8aaa" opacity="0.22"/>

  <!-- Muzzle (lighter area, protrudes down) -->
  <polygon points="44,91 78,91 73,110 61,114 49,110" fill="#9dc8da"/>

  <!-- Nose -->
  <ellipse cx="61" cy="92" rx="13" ry="8" fill="#091420"/>
  <!-- Nose gloss -->
  <ellipse cx="57" cy="89" rx="4" ry="2.5" fill="#3a7a9a" opacity="0.5"/>

  <!-- Mouth -->
  <path d="M61,100 L61,109" stroke="#091420" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M61,100 Q52,105 47,110" stroke="#091420" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <path d="M61,100 Q70,105 75,110" stroke="#091420" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Left eye socket -->
  <ellipse cx="46" cy="74" rx="10" ry="9" fill="#091420"/>
  <!-- Left iris -->
  <ellipse cx="46" cy="74" rx="7"  ry="6" fill="#2e9a5e"/>
  <!-- Left pupil -->
  <ellipse cx="46" cy="74" rx="4"  ry="5" fill="#030a10"/>
  <!-- Left catchlight -->
  <circle  cx="48" cy="72" r="1.5" fill="white"/>

  <!-- Right eye socket -->
  <ellipse cx="76" cy="74" rx="10" ry="9" fill="#091420"/>
  <!-- Right iris -->
  <ellipse cx="76" cy="74" rx="7"  ry="6" fill="#2e9a5e"/>
  <!-- Right pupil -->
  <ellipse cx="76" cy="74" rx="4"  ry="5" fill="#030a10"/>
  <!-- Right catchlight -->
  <circle  cx="78" cy="72" r="1.5" fill="white"/>

  <!-- Brow lines (stern expression) -->
  <path d="M37,66 Q46,57 55,63" stroke="#183a54" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M85,66 Q76,57 67,63" stroke="#183a54" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Fur texture lines on forehead -->
  <path d="M52,52 Q61,62 70,52" stroke="#4a8aaa" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M56,55 Q61,63 66,55" stroke="#4a8aaa" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- === COMPANY NAME TEXT === -->

  <!-- BEOWOLF -->
  <text x="134" y="54"
        font-family="Georgia,'Times New Roman',serif"
        font-size="33" font-weight="bold"
        fill="#0d1b2a" letter-spacing="3">BEOWOLF</text>

  <!-- COMPANY -->
  <text x="137" y="82"
        font-family="Georgia,'Times New Roman',serif"
        font-size="20"
        fill="#2a6a8a" letter-spacing="9">COMPANY</text>

  <!-- Separator line -->
  <line x1="134" y1="90" x2="375" y2="90" stroke="#2a6a8a" stroke-width="0.8" opacity="0.5"/>

  <!-- Tagline -->
  <text x="136" y="107"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11"
        fill="#6a9ab8" letter-spacing="3">INNOVACIÓN · LIDERAZGO</text>

</svg>
